<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Watch Out For Me | Supervisor Private Test</title>
    <style>
        :root {
            --primary-gold: #D4AF37;
            --deep-black: #0a0a0a;
            --soft-white: #f4f4f4;
        }

        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            margin: 0;
            background-color: var(--deep-black);
            color: var(--soft-white);
            overflow-x: hidden;
        }

        /* SCREEN LOCKER */
        #gatekeeper {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #000;
            z-index: 10000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        .key-box {
            background: #111;
            padding: 40px;
            border: 2px solid var(--primary-gold);
            border-radius: 20px;
            box-shadow: 0 0 30px rgba(212, 175, 55, 0.2);
        }

        input[type="password"] {
            padding: 15px;
            width: 200px;
            border-radius: 5px;
            border: 1px solid #444;
            background: #222;
            color: white;
            font-size: 1.2rem;
            margin-bottom: 20px;
            display: block;
            margin-left: auto;
            margin-right: auto;
        }

        /* HIDDEN CONTENT */
        #app-content { visibility: hidden; height: 0; overflow: hidden; }

        .btn {
            background-color: var(--primary-gold);
            color: black;
            padding: 15px 30px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            border: none;
            text-transform: uppercase;
        }

        /* LAYOUT STYLING */
        .container { width: 90%; max-width: 1000px; margin: 0 auto; padding: 40px 0; }
        .hero { background: #1a1a1a; padding: 40px; border-radius: 20px; text-align: center; border: 1px solid #333; }
        .main-img { width: 100%; max-width: 500px; border-radius: 10px; margin: 20px 0; }
    </style>
</head>
<body>

<div id="gatekeeper">
    <div class="key-box">
        <h2 style="color: var(--primary-gold);">SUPERVISOR ACCESS</h2>
        <p>Private Testing Environment</p>
        <input type="password" id="passkey" placeholder="Enter Key...">
        <button type="button" class="btn" onclick="verifyAccess()">Unlock App</button>
        <p id="error-msg" style="color: #ff4444; display: none; margin-top: 15px;">Access Denied: Key Incorrect</p>
    </div>
</div>

<div id="app-content">
    <header style="text-align: center; padding: 40px; background: #111;">
        <h1>WATCH OUT FOR ME</h1>
        <p style="color: var(--primary-gold);">LIVE TESTING MODE ACTIVE</p>
    </header>

    <div class="container">
        <div class="hero">
            <img src="https://images.unsplash.com/photo-1511632765486-a01980e01a18?auto=format&fit=crop&w=800&q=80" class="main-img">
            <h2>LIFETIME SUPERVISION KEY</h2>
            <p>Test the email link below to ensure it opens to <strong>watchout4us.com</strong></p>
            <a href="mailto:edwardporter@watchout4us.com" class="btn">Test Order Email</a>
        </div>
    </div>
</div>

<script>
    // This function unlocks the page
    function verifyAccess() {
        var enteredValue = document.getElementById("passkey").value;
        var secretKey = "1974"; // Change this if you want a different code

        if (enteredValue === secretKey) {
            // Hide the lock screen
            document.getElementById("gatekeeper").style.display = "none";
            // Show the app content
            document.getElementById("app-content").style.visibility = "visible";
            document.getElementById("app-content").style.height = "auto";
        } else {
            // Show error message
            document.getElementById("error-msg").style.display = "block";
            // Clear the input
            document.getElementById("passkey").value = "";
        }
    }

    // This part allows you to just hit 'Enter' instead of clicking the button
    document.getElementById("passkey").addEventListener("keyup", function(event) {
        if (event.keyCode === 13) {
            verifyAccess();
        }
    });
</script>

</body>
</html>
