<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guardian 5.0 - Gold Admin Engine</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { margin: 0; background: black; color: #a1a1aa; font-family: sans-serif; overflow-x: hidden; }
        .gold-text {
            background: linear-gradient(to right, #BF953F, #FCF6BA, #B38728, #FBF5B7, #AA771C);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            display: inline-block;
        }
        ::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect } = React;
        function App() {
            const [view, setView] = useState('landing'); 
            const [customerEmail, setCustomerEmail] = useState('');
            const [agreedToTerms, setAgreedToTerms] = useState(false);

            const GoldLogo = () => (
                <svg width="40" height="40" viewBox="0 0 100 100" fill="none">
                    <circle cx="50" cy="50" r="48" stroke="url(#goldGrad)" strokeWidth="4" />
                    <path d="M25 35L40 75L50 50L60 75L75 35" stroke="url(#goldGrad)" strokeWidth="8" strokeLinecap="round" strokeLinejoin="round" />
                    <defs>
                        <linearGradient id="goldGrad" x1="0" y1="0" x2="100" y2="100">
                            <stop stopColor="#BF953F" /><stop offset="0.5" stopColor="#B38728" /><stop offset="1" stopColor="#AA771C" />
                        </linearGradient>
                    </defs>
                </svg>
            );

            return (
                <div className="min-h-screen bg-black text-zinc-400">
                    <nav className="fixed top-0 w-full p-6 flex justify-between items-center z-50 bg-black/80 backdrop-blur-md border-b border-white/5">
                        <div className="flex items-center gap-4 cursor-pointer" onClick={() => setView('landing')}>
                            <GoldLogo />
                            <div className="flex flex-col">
                                <span className="text-sm font-black tracking-widest text-white uppercase italic leading-none">Watch Out 4 Me</span>
                                <span className="text-[8px] font-mono text-yellow-600 uppercase tracking-widest">v5.6 Secure Access Node</span>
                            </div>
                        </div>
                        <button onClick={() => setView('checkout')} className="text-[9px] uppercase tracking-widest text-yellow-600 border border-yellow-900/30 px-4 py-2 rounded-full">Secure Key</button>
                    </nav>

                    <div className="max-w-6xl mx-auto px-6 pt-32">
                        {view === 'landing' && (
                            <div className="grid lg:grid-cols-2 gap-20 items-center">
                                <div className="space-y-10">
                                    <h1 className="text-7xl md:text-8xl font-black italic tracking-tighter uppercase leading-[0.8] text-white">WATCH<br />OUT<br /><span className="gold-text">4 ME.</span></h1>
                                    <p className="text-xl text-zinc-500 italic border-l-2 border-yellow-600 pl-6">Professional security infrastructure. Permanent AI nodes, tactical tools, and a global community.</p>
                                    <button onClick={() => setView('checkout')} className="px-10 py-5 bg-gradient-to-br from-yellow-400 to-yellow-700 text-black font-black uppercase text-[10px] tracking-widest rounded-2xl">Get Access Key — $99</button>
                                </div>
                                <div className="grid grid-cols-2 gap-4">
                                    {['Silent SOS', 'Advanced AI', 'Visual Engine', 'Clean Node'].map((t, i) => (
                                        <div key={i} className="p-8 bg-zinc-950 border border-white/5 rounded-3xl space-y-2">
                                            <div className="text-white font-black uppercase text-xs tracking-tighter">{t}</div>
                                            <div className="text-[10px] text-zinc-600 font-mono uppercase">Authorized Module</div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}

                        {view === 'checkout' && (
                            <div className="max-w-md mx-auto bg-zinc-950 border border-yellow-600/20 rounded-[3rem] p-12 space-y-8 shadow-2xl">
                                <div className="text-center">
                                    <h2 className="text-3xl font-black text-white italic uppercase tracking-tighter">Authorization</h2>
                                    <p className="text-[9px] font-mono text-yellow-600 uppercase tracking-[0.4em]">Secure Uplink</p>
                                </div>
                                <div className="p-6 bg-zinc-900 border border-yellow-600/20 rounded-2xl text-white font-mono text-center">
                                    <div className="text-[10px] text-zinc-500 uppercase mb-2">Zelle Destination</div>
                                    <div className="gold-text text-lg font-black break-all uppercase">EDWARDPORTER2526@GMAIL.COM</div>
                                </div>
                                <input 
                                    type="email" placeholder="Your Verification Email"
                                    className="w-full bg-zinc-900 border border-white/10 p-5 rounded-2xl text-white outline-none text-center text-sm"
                                    value={customerEmail} onChange={(e) => setCustomerEmail(e.target.value)}
                                />
                                <div className="flex gap-4 p-4 bg-zinc-900/30 rounded-2xl border border-white/5 items-start">
                                    <input type="checkbox" checked={agreedToTerms} onChange={(e) => setAgreedToTerms(e.target.checked)} className="mt-1" />
                                    <label className="text-[10px] text-zinc-500 uppercase tracking-widest leading-tight font-bold italic">I agree to the Watch Out terms.</label>
                                </div>
                                <button onClick={() => setView('success')} disabled={!customerEmail || !agreedToTerms} className="w-full py-6 bg-gradient-to-r from-yellow-500 to-yellow-700 text-black font-black uppercase text-[10px] tracking-[0.3em] rounded-2xl">Activate Node</button>
                            </div>
                        )}

                        {view === 'success' && (
                            <div className="max-w-md mx-auto text-center space-y-10 py-10">
                                <h2 className="text-5xl font-black text-white italic uppercase tracking-tighter">Authorized</h2>
                                <div className="p-10 bg-zinc-950 border border-yellow-600/20 rounded-[3rem] space-y-4">
                                    <p className="text-[10px] text-zinc-500 uppercase font-mono tracking-widest">Account: {customerEmail}</p>
                                    <div className="gold-text text-4xl font-mono font-black animate-pulse uppercase">VALIDATING</div>
                                    <p className="text-[9px] text-zinc-600 uppercase tracking-widest font-bold">Key appears after Zelle verification (12-24h).</p>
                                </div>
                            </div>
                        )}
                    </div>
                </div>
            );
        }
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
