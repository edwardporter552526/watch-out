<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Watch Out 4 Me - Guardian Node</title>
    <!-- Load React & Tailwind directly for Wix Compatibility -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: black; margin: 0; overflow-x: hidden; color: #a1a1aa; }
        .gold-text {
            background: linear-gradient(to right, #BF953F, #FCF6BA, #B38728, #FBF5B7, #AA771C);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        ::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- CONFIGURATION ---
        const apiKey = "AIzaSyDPj_hRGCmhqR7EjyXcGTqvi2HmsBbPnwo"; 
        
        // We will try these in order to bypass any 404/Availability issues
        const MODEL_PRIORITY = ["gemini-1.5-flash", "gemini-pro"];

        const App = () => {
            const [view, setView] = useState('landing');
            const [booting, setBooting] = useState(true);
            const [aiInput, setAiInput] = useState("");
            const [aiResponse, setAiResponse] = useState("");
            const [isAiLoading, setIsAiLoading] = useState(false);
            const [customerEmail, setCustomerEmail] = useState('');
            const [agreedToTerms, setAgreedToTerms] = useState(false);

            useEffect(() => {
                const timer = setTimeout(() => setBooting(false), 1500);
                return () => clearTimeout(timer);
            }, []);

            const callGemini = async (prompt, modelIndex = 0) => {
                if (!apiKey) return "ERROR: API Key Missing.";
                if (modelIndex >= MODEL_PRIORITY.length) return "CRITICAL: All satellite uplinks (models) returned 404. Verify API Key permissions in Google AI Studio.";

                const currentModel = MODEL_PRIORITY[modelIndex];
                
                try {
                    // Try the v1beta endpoint first as it's the most flexible
                    const url = `https://generativelanguage.googleapis.com/v1beta/models/${currentModel}:generateContent?key=${apiKey}`;
                    
                    const response = await fetch(url, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{ parts: [{ text: prompt }] }],
                            generationConfig: {
                                temperature: 0.7,
                                topK: 1,
                                topP: 1,
                                maxOutputTokens: 200,
                            }
                        })
                    });

                    if (response.status === 404) {
                        console.warn(`Model ${currentModel} not found. Trying fallback...`);
                        return callGemini(prompt, modelIndex + 1);
                    }

                    if (!response.ok) {
                        const errorData = await response.json();
                        return `UPLINK ALERT: ${errorData.error?.message || 'Connection unstable.'}`;
                    }

                    const data = await response.json();
                    return data.candidates?.[0]?.content?.parts?.[0]?.text || "Tactical Link Established. Situation analyzed.";
                } catch (err) {
                    return "HARDWARE ERROR: Local connection blocked. Check Wix Sandbox settings.";
                }
            };

            const handleAiTest = async () => {
                if (!aiInput || isAiLoading) return;
                setIsAiLoading(true);
                setAiResponse("INITIALIZING SECURE HANDSHAKE...");
                const res = await callGemini(aiInput);
                setAiResponse(res);
                setIsAiLoading(false);
            };

            if (booting) return (
                <div className="flex flex-col items-center justify-center min-h-screen bg-black">
                    <div className="w-12 h-12 border-4 border-yellow-600/10 border-t-yellow-600 rounded-full animate-spin"></div>
                    <p className="mt-8 text-[10px] font-mono tracking-[0.5em] text-yellow-600 animate-pulse uppercase">W4O // SCANNING PERIMETER</p>
                </div>
            );

            return (
                <div className="min-h-screen bg-black text-zinc-400 p-6 md:p-12">
                    <nav className="flex justify-between items-center py-6 border-b border-white/5 mb-16">
                        <div>
                            <div className="text-white font-black uppercase italic tracking-widest leading-none text-xl">Watch Out 4 Me</div>
                            <div className="text-[8px] text-yellow-600 font-mono tracking-widest uppercase mt-1">Guardian 5.0 Node</div>
                        </div>
                        <button onClick={() => setView('checkout')} className="text-[10px] font-bold uppercase tracking-widest text-yellow-600 border border-yellow-900/50 px-6 py-2.5 rounded-full hover:bg-yellow-600 hover:text-black transition-all">Provision Node</button>
                    </nav>

                    {view === 'landing' && (
                        <div className="max-w-6xl mx-auto grid lg:grid-cols-2 gap-20 items-center">
                            <div className="space-y-12">
                                <h1 className="text-7xl md:text-[9.5rem] font-black text-white italic uppercase tracking-tighter leading-[0.75]">
                                    WATCH<br/>OUT<br/><span className="gold-text">4 ME.</span>
                                </h1>
                                <p className="text-xl text-zinc-500 italic border-l-2 border-yellow-600 pl-8 max-w-md">The Gold Standard of Personal Security. Live Uplinks & AI Stealth Nodes.</p>
                                <button onClick={() => setView('checkout')} className="px-14 py-7 bg-gradient-to-r from-yellow-500 to-yellow-700 text-black font-black uppercase text-xs tracking-widest rounded-3xl hover:scale-105 transition-transform shadow-2xl shadow-yellow-600/20">Provision Node — $99</button>
                            </div>

                            <div className="bg-zinc-950 border border-yellow-600/20 p-10 rounded-[3.5rem] space-y-8 shadow-2xl relative">
                                <div className="flex justify-between items-center border-b border-white/5 pb-4">
                                    <div className="text-[10px] font-mono text-zinc-500 uppercase tracking-widest">Tactical Handshake Simulator</div>
                                    <div className={`w-2 h-2 rounded-full ${isAiLoading ? 'bg-yellow-500 animate-ping' : 'bg-green-500'}`}></div>
                                </div>
                                <div className="min-h-[160px] text-sm italic text-zinc-400 leading-relaxed overflow-y-auto max-h-[300px] font-mono">
                                    {aiResponse || "Awaiting scenario input... Try: 'Someone is following me to my car.'"}
                                </div>
                                <div className="relative group">
                                    <input 
                                        type="text" 
                                        value={aiInput}
                                        onChange={(e) => setAiInput(e.target.value)}
                                        onKeyPress={(e) => e.key === 'Enter' && handleAiTest()}
                                        placeholder="Enter safety scenario..." 
                                        className="w-full bg-zinc-900/50 border border-white/10 p-5 rounded-2xl text-white text-sm outline-none focus:border-yellow-600 transition-all font-mono"
                                    />
                                    <button onClick={handleAiTest} className="absolute right-2 top-2 bottom-2 px-6 bg-yellow-600 text-black text-[10px] font-black rounded-xl uppercase tracking-widest hover:bg-yellow-400">Test Link</button>
                                </div>
                                <p className="text-[8px] text-zinc-700 uppercase tracking-widest text-center">Satellite Model: {MODEL_PRIORITY[0]}</p>
                            </div>
                        </div>
                    )}

                    {view === 'checkout' && (
                        <div className="max-w-md mx-auto bg-zinc-950 border border-yellow-600/30 p-12 rounded-[4rem] space-y-10 text-center shadow-2xl">
                            <h2 className="text-4xl font-black text-white italic uppercase tracking-tight">Provisioning</h2>
                            <div className="bg-zinc-900/50 p-8 rounded-3xl border border-white/5 space-y-4">
                                <div className="text-[10px] uppercase text-zinc-600 font-bold tracking-widest">Zelle Payment Address</div>
                                <div className="gold-text font-black break-all text-base uppercase tracking-tighter">EDWARDPORTER2526@GMAIL.COM</div>
                            </div>
                            <input 
                                type="email" 
                                placeholder="Verification Email"
                                value={customerEmail}
                                onChange={(e) => setCustomerEmail(e.target.value)}
                                className="w-full bg-zinc-900 border border-white/10 p-6 rounded-3xl text-white outline-none focus:border-yellow-600 text-center text-sm font-bold tracking-widest"
                            />
                            <div className="flex items-start gap-4 text-left p-2">
                                <input type="checkbox" checked={agreedToTerms} onChange={(e) => setAgreedToTerms(e.target.checked)} className="mt-1 w-5 h-5 accent-yellow-600" />
                                <label className="text-[9px] text-zinc-500 uppercase leading-relaxed font-bold tracking-widest cursor-pointer">I agree to the Guardian Node Terms & Liability Release.</label>
                            </div>
                            <button 
                                onClick={() => setView('success')}
                                disabled={!customerEmail || !agreedToTerms}
                                className="w-full py-7 bg-yellow-600 text-black font-black uppercase tracking-[0.2em] text-xs rounded-3xl disabled:opacity-20 shadow-xl shadow-yellow-600/10 transition-all"
                            >
                                Activate Node
                            </button>
                            <button onClick={() => setView('landing')} className="text-[10px] uppercase tracking-widest text-zinc-700 hover:text-zinc-500">Cancel</button>
                        </div>
                    )}

                    {view === 'success' && (
                        <div className="max-w-md mx-auto text-center space-y-12 py-12">
                            <h2 className="text-6xl font-black text-white italic uppercase leading-none">Node<br/><span className="gold-text tracking-tighter">Provisioned.</span></h2>
                            <div className="bg-zinc-950 border-2 border-yellow-600/20 p-12 rounded-[5rem] shadow-4xl">
                                <div className="text-[10px] text-zinc-600 uppercase tracking-[0.4em] mb-6 font-bold">Uplink Status</div>
                                <div className="text-5xl font-mono text-white animate-pulse tracking-widest font-bold">VALIDATING</div>
                                <p className="text-[10px] text-zinc-500 mt-10 uppercase leading-relaxed tracking-widest italic font-bold text-center">License keys are released within 24h of Zelle verification.</p>
                            </div>
                            <button onClick={() => setView('landing')} className="text-[10px] text-zinc-700 underline font-black uppercase tracking-widest hover:text-white transition-colors">Return Home</button>
                        </div>
                    )}

                    <footer className="mt-40 text-center text-[9px] font-mono text-zinc-800 tracking-[0.5em] uppercase italic">
                        © 2026 // Watch Out 4 Me Tactical Infrastructure | Admin: edwardwatchout4us@gmail.com
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
