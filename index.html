<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Watch Out 4 Me | Guardian Node Infrastructure</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: black; margin: 0; overflow-x: hidden; color: #a1a1aa; }
        .gold-text {
            background: linear-gradient(to right, #BF953F, #FCF6BA, #B38728, #FBF5B7, #AA771C);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .gold-border { border: 1px solid rgba(191, 149, 63, 0.3); }
        ::-webkit-scrollbar { display: none; }
        .fade-in { animation: fadeIn 0.8s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- MASTER CONFIG ---
        const apiKey = "AIzaSyDPj_hRGCmhqR7EjyXcGTqvi2HmsBbPnwo"; 
        const ZELLE_DESTINATION = "EDWARDPORTER2526@GMAIL.COM";
        const MODEL_PRIORITY = ["gemini-1.5-flash", "gemini-pro"];

        const App = () => {
            const [view, setView] = useState('landing');
            const [booting, setBooting] = useState(true);
            const [aiInput, setAiInput] = useState("");
            const [aiResponse, setAiResponse] = useState("");
            const [isAiLoading, setIsAiLoading] = useState(false);
            const [customerEmail, setCustomerEmail] = useState('');
            const [agreedToTerms, setAgreedToTerms] = useState(false);

            useEffect(() => {
                const timer = setTimeout(() => setBooting(false), 1200);
                return () => clearTimeout(timer);
            }, []);

            const callGemini = async (prompt, modelIndex = 0) => {
                if (!apiKey) return "ERROR: API Key Missing.";
                if (modelIndex >= MODEL_PRIORITY.length) return "CRITICAL: Satellite uplink 404. Verify API Key.";
                const currentModel = MODEL_PRIORITY[modelIndex];
                try {
                    const url = `https://generativelanguage.googleapis.com/v1beta/models/${currentModel}:generateContent?key=${apiKey}`;
                    const response = await fetch(url, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{ parts: [{ text: prompt }] }],
                            generationConfig: { temperature: 0.7, maxOutputTokens: 250 }
                        })
                    });
                    if (response.status === 404) return callGemini(prompt, modelIndex + 1);
                    const data = await response.json();
                    return data.candidates?.[0]?.content?.parts?.[0]?.text || "Link Established. Analysis complete.";
                } catch (err) { return "Uplink Error. Check Sandbox Settings."; }
            };

            const handleAiTest = async () => {
                if (!aiInput || isAiLoading) return;
                setIsAiLoading(true);
                setAiResponse("SYNCHRONIZING WITH GUARDIAN NODE...");
                const res = await callGemini(aiInput);
                setAiResponse(res);
                setIsAiLoading(false);
            };

            if (booting) return (
                <div className="flex flex-col items-center justify-center min-h-screen bg-black">
                    <div className="w-10 h-10 border-2 border-yellow-600/20 border-t-yellow-600 rounded-full animate-spin"></div>
                    <p className="mt-6 text-[9px] font-mono tracking-[0.5em] text-yellow-600 animate-pulse uppercase">W4O // DEPLOYING INFRASTRUCTURE</p>
                </div>
            );

            return (
                <div className="min-h-screen bg-black text-zinc-400">
                    {/* TOP NAV */}
                    <nav className="flex justify-between items-center px-6 py-8 border-b border-white/5 bg-black sticky top-0 z-50">
                        <div className="cursor-pointer" onClick={() => setView('landing')}>
                            <div className="text-white font-black uppercase italic tracking-widest leading-none text-xl">Watch Out 4 Me</div>
                            <div className="text-[8px] text-yellow-600 font-mono tracking-widest uppercase mt-1">v5.6 Tactical Node</div>
                        </div>
                        <button onClick={() => setView('checkout')} className="text-[9px] font-bold uppercase tracking-widest text-yellow-600 border border-yellow-900/50 px-6 py-2 rounded-full hover:bg-yellow-600 hover:text-black transition-all">Provision Node</button>
                    </nav>

                    {view === 'landing' && (
                        <div className="max-w-6xl mx-auto px-6 py-20 space-y-32 fade-in">
                            {/* HERO SECTION */}
                            <div className="grid lg:grid-cols-2 gap-20 items-center">
                                <div className="space-y-12">
                                    <h1 className="text-7xl md:text-[9rem] font-black text-white italic uppercase tracking-tighter leading-[0.75]">
                                        WATCH<br/>OUT<br/><span className="gold-text">4 ME.</span>
                                    </h1>
                                    <p className="text-xl text-zinc-500 italic border-l-2 border-yellow-600 pl-8 max-w-md">Professional security infrastructure. Live visual uplinks, AI protection, and the Safety Line.</p>
                                    <button onClick={() => setView('checkout')} className="px-14 py-7 bg-gradient-to-r from-yellow-500 to-yellow-700 text-black font-black uppercase text-xs tracking-widest rounded-3xl hover:scale-105 transition-transform shadow-2xl shadow-yellow-600/20">Get Access — $99</button>
                                </div>

                                {/* AI TEST BOX */}
                                <div className="bg-zinc-950 border border-yellow-600/20 p-10 rounded-[3.5rem] space-y-8 shadow-2xl relative">
                                    <div className="flex justify-between items-center border-b border-white/5 pb-4">
                                        <div className="text-[10px] font-mono text-zinc-500 uppercase tracking-widest">Tactical Handshake Simulator</div>
                                        <div className={`w-2 h-2 rounded-full ${isAiLoading ? 'bg-yellow-500 animate-ping' : 'bg-green-500'}`}></div>
                                    </div>
                                    <div className="min-h-[160px] text-sm italic text-zinc-400 leading-relaxed overflow-y-auto max-h-[300px] font-mono">
                                        {aiResponse || "System Ready. Describe a situation: 'Someone is outside my door.'"}
                                    </div>
                                    <div className="relative group">
                                        <input 
                                            type="text" value={aiInput} onChange={(e) => setAiInput(e.target.value)}
                                            onKeyPress={(e) => e.key === 'Enter' && handleAiTest()}
                                            placeholder="Scenario input..." 
                                            className="w-full bg-zinc-900/50 border border-white/10 p-5 rounded-2xl text-white text-sm outline-none focus:border-yellow-600 transition-all font-mono"
                                        />
                                        <button onClick={handleAiTest} className="absolute right-2 top-2 bottom-2 px-6 bg-yellow-600 text-black text-[10px] font-black rounded-xl uppercase tracking-widest">Test Link</button>
                                    </div>
                                </div>
                            </div>

                            {/* THE MISSION / WHY IT MATTERS SECTION */}
                            <div className="py-20 border-t border-white/5">
                                <h2 className="text-4xl font-black italic text-white uppercase tracking-tighter mb-12">Security For <span className="gold-text">Safety</span></h2>
                                <div className="grid md:grid-cols-3 gap-12">
                                    <div className="space-y-6">
                                        <div className="text-yellow-600 font-black text-xs tracking-[0.3em] uppercase italic">01 // The Safety Line</div>
                                        <p className="text-sm leading-relaxed text-zinc-400 uppercase font-bold tracking-tighter">Built for the vulnerable. Permanent fall detection and medical SOS triggers that ensure seniors and at-risk individuals are never alone in a crisis.</p>
                                    </div>
                                    <div className="space-y-6">
                                        <div className="text-yellow-600 font-black text-xs tracking-[0.3em] uppercase italic">02 // Quiet Situations</div>
                                        <p className="text-sm leading-relaxed text-zinc-400 uppercase font-bold tracking-tighter">When you can't speak, the AI does. For stalking or domestic threats, our Gemini Handshake initiates a voice relay with GPS to emergency dispatch.</p>
                                    </div>
                                    <div className="space-y-6">
                                        <div className="text-yellow-600 font-black text-xs tracking-[0.3em] uppercase italic">03 // Stealth Guardian</div>
                                        <p className="text-sm leading-relaxed text-zinc-400 uppercase font-bold tracking-tighter">Transform your device into a Blackout Node. To an aggressor, the phone looks off. In reality, it is live-streaming audio and visual to a secure cloud.</p>
                                    </div>
                                </div>
                            </div>

                            {/* NEW DETAILED FEATURES SECTION */}
                            <div className="py-20 bg-zinc-950/50 rounded-[4rem] p-12 border border-white/5">
                                <h2 className="text-3xl font-black italic text-white uppercase tracking-tighter mb-10">Advanced <span className="gold-text">Protocols</span></h2>
                                <div className="grid md:grid-cols-2 gap-10">
                                    <div className="flex gap-6">
                                        <div className="w-2 h-2 rounded-full bg-yellow-600 mt-2 flex-shrink-0"></div>
                                        <div>
                                            <h4 className="text-white font-bold uppercase text-xs mb-2">GPS Hard-Lock Broadcasting</h4>
                                            <p className="text-xs text-zinc-500 leading-relaxed uppercase">Real-time coordinate transmission ensures that even in motion, rescue teams have a locked target on your location.</p>
                                        </div>
                                    </div>
                                    <div className="flex gap-6">
                                        <div className="w-2 h-2 rounded-full bg-yellow-600 mt-2 flex-shrink-0"></div>
                                        <div>
                                            <h4 className="text-white font-bold uppercase text-xs mb-2">Encrypted Visual Uplink</h4>
                                            <p className="text-xs text-zinc-500 leading-relaxed uppercase">Your camera becomes a tactical eye, streaming evidence directly to a cloud node that cannot be deleted by an aggressor.</p>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}

                    {view === 'checkout' && (
                        <div className="max-w-md mx-auto py-20 px-6 fade-in">
                            <div className="bg-zinc-950 border border-yellow-600/30 p-12 rounded-[4rem] space-y-10 text-center shadow-2xl">
                                <h2 className="text-4xl font-black text-white italic uppercase tracking-tight">Provisioning</h2>
                                <div className="bg-zinc-900/50 p-8 rounded-3xl border border-white/5 space-y-4">
                                    <div className="text-[10px] uppercase text-zinc-600 font-bold tracking-widest">Zelle Payment Destination</div>
                                    <div className="gold-text font-black break-all text-base uppercase tracking-tighter">{ZELLE_DESTINATION}</div>
                                </div>
                                <input 
                                    type="email" placeholder="Email for Key Delivery"
                                    value={customerEmail} onChange={(e) => setCustomerEmail(e.target.value)}
                                    className="w-full bg-zinc-900 border border-white/10 p-6 rounded-3xl text-white outline-none focus:border-yellow-600 text-center text-sm font-bold tracking-widest"
                                />
                                <div className="flex items-start gap-4 text-left p-2">
                                    <input type="checkbox" checked={agreedToTerms} onChange={(e) => setAgreedToTerms(e.target.checked)} className="mt-1 w-5 h-5 accent-yellow-600 cursor-pointer" />
                                    <label className="text-[9px] text-zinc-500 uppercase leading-relaxed font-bold tracking-widest cursor-pointer">I acknowledge the terms of the Guardian Node EULA and Liability Release.</label>
                                </div>
                                <button 
                                    onClick={() => setView('success')}
                                    disabled={!customerEmail || !agreedToTerms}
                                    className="w-full py-7 bg-yellow-600 text-black font-black uppercase tracking-[0.2em] text-xs rounded-3xl disabled:opacity-20 shadow-xl shadow-yellow-600/10 transition-all hover:bg-yellow-500"
                                >
                                    Activate Node — $99
                                </button>
                                <button onClick={() => setView('landing')} className="text-[10px] uppercase tracking-widest text-zinc-700 hover:text-zinc-500">Back to Overview</button>
                            </div>
                        </div>
                    )}

                    {view === 'success' && (
                        <div className="max-w-md mx-auto text-center space-y-12 py-32 fade-in px-6">
                            <h2 className="text-6xl font-black text-white italic uppercase leading-none">Thank<br/><span className="gold-text tracking-tighter">You.</span></h2>
                            <div className="bg-zinc-950 border-2 border-yellow-600/20 p-12 rounded-[5rem] shadow-4xl space-y-8">
                                <div className="text-[10px] text-zinc-600 uppercase tracking-[0.4em] font-bold">Purchase Received</div>
                                <div className="text-4xl font-mono text-white animate-pulse tracking-widest font-bold">VALIDATING</div>
                                <p className="text-[11px] text-zinc-400 uppercase leading-relaxed tracking-widest italic font-bold">
                                    Your order is in the queue. Please be looking for your unique Activation Key in your inbox ({customerEmail}) within 12-24 hours.
                                </p>
                                <div className="pt-6 border-t border-white/5">
                                    <p className="text-[9px] text-yellow-600 uppercase tracking-widest font-mono">Satellite Sync: Active</p>
                                </div>
                            </div>
                            <button onClick={() => setView('landing')} className="text-[10px] text-zinc-700 underline font-black uppercase tracking-widest hover:text-white transition-colors">Return to Main Hub</button>
                        </div>
                    )}

                    <footer className="mt-40 border-t border-white/5 py-12 text-center text-[9px] font-mono text-zinc-800 tracking-[0.5em] uppercase italic px-6">
                        © 2026 // Watch Out 4 Me Tactical Infrastructure | Edward Watch Out 4 Us
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
