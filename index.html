<!DOCTYPE html>
<html>
<head>
    <title>Watch Out For Me | Private Test</title>
    <style>
        body { background: #000; color: #D4AF37; font-family: sans-serif; text-align: center; padding: 50px; }
        .box { border: 2px solid #D4AF37; padding: 30px; display: inline-block; border-radius: 15px; background: #111; }
        input { padding: 10px; margin: 10px; border-radius: 5px; border: 1px solid #D4AF37; }
        #app { display: none; margin-top: 30px; border-top: 1px solid #333; padding-top: 30px; }
        .btn { background: #D4AF37; color: #000; padding: 10px 20px; text-decoration: none; font-weight: bold; border-radius: 5px; cursor: pointer; border: none; }
    </style>
</head>
<body>

    <div id="lock">
        <h1>WATCH OUT FOR ME</h1>
        <p>Private Supervisor Portal</p>
        <input type="password" id="pw" placeholder="Enter 1974">
        <br>
        <button class="btn" onclick="openApp()">UNLOCK SYSTEM</button>
    </div>

    <div id="app">
        <h2>SYSTEM UNLOCKED</h2>
        <p><strong>Product:</strong> Lifetime Supervision Key ($99)</p>
        <p><strong>Email:</strong> edwardporter@watchout4us.com</p>
        <br>
        <a href="mailto:edwardporter@watchout4us.com" class="btn">SEND TEST EMAIL</a>
    </div>

    <script>
        function openApp() {
            var input = document.getElementById("pw").value;
            if (input === "1974") {
                document.getElementById("lock").style.display = "none";
                document.getElementById("app").style.display = "block";
            } else {
                alert("Access Denied");
            }
        }
    </script>

</body>
</html>
