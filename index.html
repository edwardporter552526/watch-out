<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Watch Out For Me | Global AI Safety Network</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Firebase SDKs (Compatibility Version) -->
    <script src="https://www.gstatic.com/firebasejs/11.0.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/11.0.2/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/11.0.2/firebase-firestore-compat.js"></script>
</head>
<body class="bg-[#050507] text-white font-sans antialiased">

    <div id="app">
        <!-- Loading State -->
        <div class="min-h-screen flex items-center justify-center">
            <div class="w-12 h-12 border-4 border-indigo-500/20 border-t-indigo-500 rounded-full animate-spin"></div>
        </div>
    </div>

    <script>
        // --- 1. CONFIGURATION ---
        // Ensure you paste your actual Gemini API Key inside the quotes below
        const apiKey = ""; 
        const STRIPE_LINK = "https://buy.stripe.com/your_link_here";
        const appId = "watch-out-global-v1";

        // Firebase Initialization (Environment will provide __firebase_config)
        const firebaseConfig = JSON.parse(__firebase_config);
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        const appContainer = document.getElementById('app');

        // --- 2. AUTHENTICATION ---
        auth.signInAnonymously().catch(err => console.error("Auth Error:", err));

        auth.onAuthStateChanged(user => {
            if (user) {
                checkPaymentStatus(user);
            }
        });

        // --- 3. CORE LOGIC ---
        async function checkPaymentStatus(user) {
            // Path: /artifacts/{appId}/public/data/customers/{userId}
            const docRef = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('customers').doc(user.uid);
            
            docRef.onSnapshot((doc) => {
                if (doc.exists && doc.data().status === 'active') {
                    renderApp(user);
                } else {
                    renderLandingPage();
                }
            }, (error) => {
                console.error("Firestore Error:", error);
                renderLandingPage(); // Fallback to landing if error
            });
        }

        function renderLandingPage() {
            appContainer.innerHTML = `
                <nav class="fixed top-0 w-full z-50 bg-[#050507]/80 backdrop-blur-md border-b border-white/5 px-6 py-4">
                    <div class="max-w-6xl mx-auto flex justify-between items-center">
                        <div class="flex items-center gap-2">
                            <i data-lucide="shield-check" class="text-indigo-500"></i>
                            <span class="font-black uppercase text-lg tracking-tighter italic">Watch Out <span class="text-indigo-500">For Me</span></span>
                        </div>
                        <a href="${STRIPE_LINK}" class="bg-white text-black text-[10px] font-black px-5 py-2.5 rounded-full uppercase tracking-widest hover:bg-indigo-500 hover:text-white transition-all">Get Access</a>
                    </div>
                </nav>

                <header class="pt-40 pb-20 px-6 text-center space-y-8 max-w-4xl mx-auto">
                    <div class="inline-flex items-center gap-2 bg-indigo-500/10 border border-indigo-500/20 px-4 py-2 rounded-full">
                        <i data-lucide="globe" class="w-3 h-3 text-indigo-400"></i>
                        <span class="text-[10px] font-black uppercase tracking-[0.2em] text-indigo-400">Global Launch v2.0</span>
                    </div>
                    <h1 class="text-5xl md:text-7xl font-black tracking-tighter leading-none uppercase italic">AI IS POWERFUL. <br/><span class="text-indigo-500">WE MAKE IT SAFE.</span></h1>
                    <p class="text-gray-400 text-lg max-w-2xl mx-auto font-medium">Join the worldwide peer-supervised AI network. One-time payment. Lifetime global safety.</p>
                    <div class="pt-6">
                        <a href="${STRIPE_LINK}" class="inline-block bg-indigo-600 px-10 py-5 rounded-2xl font-black uppercase text-xs tracking-widest shadow-2xl shadow-indigo-600/20 hover:bg-indigo-500 transition-all">Join The Watch</a>
                    </div>
                    <p class="text-[9px] text-gray-600 font-bold uppercase tracking-widest">Your User ID: ${auth.currentUser ? auth.currentUser.uid : 'Initializing...'}</p>
                </header>
            `;
            lucide.createIcons();
        }

        function renderApp(user) {
            appContainer.innerHTML = `
                <div class="min-h-screen flex flex-col pt-20">
                    <div class="p-6 max-w-2xl mx-auto w-full space-y-8">
                        <div class="flex justify-between items-center">
                            <h1 class="text-2xl font-black uppercase tracking-tighter italic">The Watch Node</h1>
                            <div class="text-[10px] font-black text-emerald-500 bg-emerald-500/10 px-3 py-1 rounded-full uppercase tracking-widest flex items-center gap-2">
                                <span class="w-1.5 h-1.5 bg-emerald-500 rounded-full animate-pulse"></span> Verified Member
                            </div>
                        </div>

                        <div class="bg-white/5 p-8 rounded-[2.5rem] border border-white/10 space-y-6">
                            <textarea id="promptInput" class="w-full bg-transparent border-none text-xl outline-none min-h-[120px] text-white placeholder:text-gray-700 font-medium" placeholder="Ask the global watch..."></textarea>
                            <button id="sendBtn" onclick="handleAI()" class="w-full bg-indigo-600 hover:bg-indigo-500 py-5 rounded-2xl font-black uppercase text-xs tracking-widest transition-all">
                                Send Secure Request
                            </button>
                        </div>
                        
                        <div id="aiResponseContainer" class="hidden animate-in fade-in slide-in-from-bottom-4">
                            <h3 class="text-[10px] font-black uppercase tracking-[0.3em] text-gray-500 mb-4 px-2">Watch Response</h3>
                            <div id="aiResponseText" class="bg-white/5 p-8 rounded-[2.5rem] border border-white/5 text-gray-300 leading-relaxed text-sm italic"></div>
                        </div>
                    </div>
                </div>
            `;
            lucide.createIcons();
        }

        async function handleAI() {
            const prompt = document.getElementById('promptInput').value;
            const btn = document.getElementById('sendBtn');
            const responseContainer = document.getElementById('aiResponseContainer');
            const responseText = document.getElementById('aiResponseText');

            if (!prompt.trim() || !apiKey) {
                if (!apiKey) alert("Administrator: Please add your Gemini API Key to the code.");
                return;
            }

            btn.innerText = "CONSULTING THE WATCH...";
            btn.disabled = true;

            try {
                const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                });
                
                const data = await res.json();
                const aiMsg = data.candidates[0].content.parts[0].text;

                // Update UI
                responseContainer.classList.remove('hidden');
                responseText.innerText = aiMsg;

                // Log to Firestore for "Supervision"
                const user = auth.currentUser;
                await db.collection('artifacts').doc(appId).collection('users').doc(user.uid).collection('ai_logs').add({
                    prompt: prompt,
                    response: aiMsg,
                    timestamp: firebase.firestore.FieldValue.serverTimestamp()
                });

            } catch (err) {
                console.error(err);
                alert("Connection Interrupted. Please try again.");
            } finally {
                btn.innerText = "SEND SECURE REQUEST";
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
