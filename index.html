<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>W4O | Tactical Node</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;900&display=swap');
        body { margin: 0; background: black; color: white; font-family: 'Inter', sans-serif; overflow: hidden; touch-action: manipulation; }
        .gold-text { background: linear-gradient(to right, #BF953F, #FCF6BA, #B38728, #FBF5B7, #AA771C); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .status-pulse { animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: .3; } }
        .scanner { height: 2px; background: #BF953F; position: absolute; width: 100%; top: 0; animation: scan 3s linear infinite; box-shadow: 0 0 15px #BF953F; }
        @keyframes scan { 0% { top: 0; } 100% { top: 100%; } }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect } = React;

        const App = () => {
            const [isLocked, setIsLocked] = useState(true);
            const [keyCode, setKeyCode] = useState('');
            const [status, setStatus] = useState('OFFLINE');
            const [logs, setLogs] = useState(['SYSTEM IDLE', 'AWAITING AUTH...']);

            // --- AUTH LOGIC ---
            const handleAuth = () => {
                // This accepts any code starting with WO4U1 as you planned
                if (keyCode.toUpperCase().startsWith('WO4U1')) {
                    setIsLocked(false);
                    setStatus('ENCRYPTED');
                    addLog('UPLINK ESTABLISHED');
                } else {
                    alert('INVALID ACCESS KEY');
                }
            };

            const addLog = (msg) => {
                setLogs(prev => [msg, ...prev].slice(0, 5));
            };

            if (isLocked) return (
                <div className="h-screen flex flex-col items-center justify-center p-8 space-y-12 bg-zinc-950">
                    <div className="text-center space-y-2">
                        <h1 className="text-4xl font-black italic gold-text">WATCH OUT 4 ME</h1>
                        <p className="text-[10px] tracking-[0.5em] text-zinc-600 uppercase">Personal Security Node</p>
                    </div>
                    <div className="w-full space-y-4">
                        <input 
                            type="text" placeholder="ENTER ACTIVATION KEY"
                            className="w-full bg-black border border-yellow-600/30 p-6 rounded-2xl text-center text-white font-black tracking-widest outline-none focus:border-yellow-600 transition-all"
                            value={keyCode} onChange={(e) => setKeyCode(e.target.value)}
                        />
                        <button onClick={handleAuth} className="w-full py-6 bg-yellow-600 text-black font-black uppercase tracking-widest rounded-2xl active:scale-95 transition-transform">Authorize Node</button>
                    </div>
                    <p className="text-[9px] text-zinc-700 text-center uppercase tracking-widest">Enterprise Encryption Active</p>
                </div>
            );

            return (
                <div className="h-screen flex flex-col p-6 relative overflow-hidden">
                    <div className="scanner opacity-20"></div>
                    
                    {/* Header */}
                    <div className="flex justify-between items-start pt-4">
                        <div>
                            <h2 className="font-black italic text-xl leading-none">W4O NODE</h2>
                            <div className="flex items-center gap-2 mt-1">
                                <div className="w-2 h-2 rounded-full bg-green-500 status-pulse"></div>
                                <span className="text-[9px] font-mono text-green-500 tracking-widest uppercase">{status}</span>
                            </div>
                        </div>
                        <div className="text-right">
                            <div className="text-[8px] font-mono text-zinc-600 uppercase tracking-widest">Auth ID</div>
                            <div className="text-[10px] font-mono text-white">{keyCode.toUpperCase()}</div>
                        </div>
                    </div>

                    {/* Tactical View */}
                    <div className="flex-1 flex flex-col justify-center items-center space-y-20">
                        <button 
                            className="w-64 h-64 rounded-full border-4 border-zinc-900 flex flex-col items-center justify-center space-y-2 bg-gradient-to-b from-zinc-900 to-black shadow-2xl active:scale-90 transition-transform relative group"
                            onClick={() => {
                                addLog('SOS SIGNAL DEPLOYED');
                                setStatus('EMERGENCY');
                            }}
                        >
                            <div className="absolute inset-0 rounded-full border border-yellow-600/20 group-active:border-red-600 animate-ping"></div>
                            <span className="text-5xl">🛡️</span>
                            <span className="font-black italic text-2xl tracking-tighter text-white">SOS</span>
                        </button>
                        
                        <div className="w-full bg-zinc-950 p-6 rounded-[2rem] border border-white/5 space-y-3">
                            <div className="text-[9px] font-mono text-zinc-700 uppercase tracking-widest">Satellite Activity Log</div>
                            {logs.map((log, i) => (
                                <div key={i} className="text-[10px] font-mono text-zinc-400 uppercase tracking-tight flex gap-3">
                                    <span className="text-yellow-600">>></span> {log}
                                </div>
                            ))}
                        </div>
                    </div>

                    {/* Bottom Features */}
                    <div className="grid grid-cols-2 gap-4 pb-8">
                        <button onClick={() => addLog('AI HANDSHAKE ENABLED')} className="p-5 bg-zinc-900 rounded-3xl border border-white/5 text-[10px] font-black uppercase tracking-widest italic text-zinc-400 active:bg-yellow-600 active:text-black">AI Handshake</button>
                        <button onClick={() => addLog('STEALTH MODE ENGAGED')} className="p-5 bg-zinc-900 rounded-3xl border border-white/5 text-[10px] font-black uppercase tracking-widest italic text-zinc-400 active:bg-yellow-600 active:text-black">Stealth Mode</button>
                    </div>

                    <footer className="text-center text-[8px] font-mono text-zinc-800 tracking-[0.3em] uppercase pb-2">
                        Tactical Node 5.6 // Secure Session
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
