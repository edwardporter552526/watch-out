<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Watch Out | Official Support</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .card {
            background: white;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 400px;
        }
        h1 { color: #1a73e8; margin-bottom: 10px; }
        p { color: #5f6368; line-height: 1.5; }
        
        .button-group {
            margin: 20px 0;
        }
        .btn {
            display: block;
            background-color: #1a73e8;
            color: white;
            padding: 12px;
            margin: 10px 0;
            text-decoration: none;
            border-radius: 6px;
            font-weight: bold;
        }
        .btn:hover { background-color: #1557b0; }

        .footer-info {
            margin-top: 25px;
            font-size: 0.85rem;
            border-top: 1px solid #eee;
            padding-top: 15px;
        }
        .footer-info a { color: #1a73e8; text-decoration: none; }
    </style>
</head>
<body>

    <div class="card">
        <h1>Watch Out</h1>
        <p>Your mobile safety companion. Download the app and stay connected.</p>

        <div class="button-group">
            <a href="#" class="btn">Download on App Store</a>
            <a href="#" class="btn">Get it on Google Play</a>
        </div>

        <div class="footer-info">
            <p>For support or payment inquiries:</p>
            <strong>Edward Porter</strong><br>
            <a href="mailto:eporter@usa.com">eporter@usa.com</a>
        </div>
    </div>

</body>
</html>
