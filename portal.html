<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SECURE ACCESS | WATCH OUT</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #000000; color: #ffffff; font-family: sans-serif; }
        .card { background: #111111; border: 1px solid #333333; border-radius: 30px; }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-4">

    <div id="login-box" class="card w-full max-w-sm p-8 space-y-8 text-center">
        <h1 class="text-2xl font-black italic text-blue-500 tracking-widest uppercase text-center">AUTHENTICATE</h1>
        <input type="text" id="shadow-key" placeholder="ENTER KEY" 
               class="w-full bg-black border border-gray-700 p-4 rounded-xl text-center text-white uppercase outline-none focus:border-blue-500">
        <button onclick="unlock()" class="w-full py-4 bg-white text-black font-black rounded-xl uppercase active:scale-95 transition-all">
            Initiate Link
        </button>
        <p id="error" class="hidden text-red-500 text-[10px] font-bold uppercase">Access Denied</p>
    </div>

    <div id="dashboard" class="hidden w-full max-w-lg space-y-6">
        <div class="card p-8 text-center">
            <h1 class="text-3xl font-black italic uppercase text-green-500">ACCESS GRANTED</h1>
            <p class="text-gray-400 mt-4 uppercase text-xs tracking-widest">Supervisor Dashboard Active</p>
            <button onclick="location.reload()" class="mt-8 text-[10px] text-gray-500 uppercase font-bold">Logout</button>
        </div>
    </div>

    <script>
        function unlock() {
            // This grabs what you type and cleans it up
            const input = document.getElementById('shadow-key').value.trim().toUpperCase();
            
            // Checking for BOTH keys just to be safe
            if (input === 'DEV-TEST-2004' || input === 'STEALTH') {
                document.getElementById('login-box').style.display = 'none';
                document.getElementById('dashboard').style.display = 'block';
            } else {
                const err = document.getElementById('error');
                err.style.display = 'block';
                setTimeout(() => { err.style.display = 'none'; }, 3000);
            }
        }
    </script>
</body>
</html>
