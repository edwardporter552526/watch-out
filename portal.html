<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SECURE ACCESS | WATCH OUT</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* LG Compatibility: Using solid colors instead of heavy blurs */
        body { background-color: #000000; color: #ffffff; font-family: sans-serif; -webkit-font-smoothing: antialiased; }
        .card { background: #111111; border: 1px solid #333333; border-radius: 30px; }
        .btn-blue { background-color: #3b82f6; color: white; font-weight: 900; }
        .btn-red { background-color: #ef4444; color: white; font-weight: 900; }
        .panic-pulse { animation: pulse 0.5s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.7; } 100% { opacity: 1; } }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-4">

    <!-- LOGIN SCREEN -->
    <div id="login-box" class="card w-full max-w-sm p-8 space-y-8 text-center">
        <div class="space-y-2">
            <h1 class="text-2xl font-black italic text-blue-500 tracking-widest uppercase">AUTHENTICATE</h1>
            <p class="text-[10px] text-gray-500 uppercase tracking-widest">Enter Node Key Below</p>
        </div>
        
        <input type="text" id="shadow-key" placeholder="KEY" 
               class="w-full bg-black border border-gray-700 p-4 rounded-xl text-center text-xl tracking-[0.5em] focus:border-blue-500 outline-none text-white uppercase">
        
        <button onclick="unlock()" class="w-full py-4 bg-white text-black font-black rounded-xl uppercase tracking-widest active:scale-95 transition-all">
            Initiate Link
        </button>
        <p id="error" class="hidden text-red-500 text-[10px] font-bold uppercase">Invalid Key</p>
    </div>

    <!-- DASHBOARD -->
    <div id="dashboard" class="hidden w-full max-w-lg space-y-6">
        <div class="flex justify-between items-center px-2">
            <div class="flex items-center space-x-2">
                <div id="led" class="w-2 h-2 rounded-full bg-green-500"></div>
                <span id="status-txt" class="text-[10px] font-bold text-green-500 uppercase tracking-widest">Node: Active</span>
            </div>
            <button onclick="location.reload()" class="text-[10px] text-gray-500 font-bold uppercase">Logout</button>
        </div>

        <div class="card p-8 space-y-8 text-center">
            <h1 class="text-3xl font-black italic tracking-tighter uppercase border-b border-gray-800 pb-4">SUPERVISOR</h1>
            
            <div class="grid grid-cols-2 gap-3">
                <div class="bg-black p-4 rounded-2xl border border-gray-800">
                    <p class="text-[9px] text-blue-500 font-bold uppercase">AI Status</p>
                    <p class="text-2xl font-black">99.8%</p>
                </div>
                <div class="bg-black p-4 rounded-2xl border border-gray-800">
                    <p class="text-[9px] text-gray-500 font-bold uppercase">Uptime</p>
                    <p class="text-2xl font-black italic">14h</p>
                </div>
            </div>

            <div class="pt-4 space-y-3">
                <p class="text-[9px] text-gray-600 uppercase tracking-[0.2em] font-bold text-center">Emergency Protocol</p>
                <button id="panic-btn" onclick="triggerPanic()" 
                        class="w-full py-8 bg-red-900/30 border-2 border-red-500/50 rounded-2xl text-red-500 font-black text-xl uppercase tracking-widest active:scale-95 transition-all">
                    PANIC RESET
                </button>
            </div>
        </div>
    </div>

    <script>
        function unlock() {
            const key = document.getElementById('shadow-key').value.trim().toUpperCase();
            if (key === 'STEALTH') {
                document.getElementById('login-box').style.display = 'none';
                document.getElementById('dashboard').style.display = 'block';
            } else {
                const err = document.getElementById('error');
                err.style.display = 'block';
                setTimeout(() => { err.style.display = 'none'; }, 2000);
            }
        }

        function triggerPanic() {
            const btn = document.getElementById('panic-btn');
            const led = document.getElementById('led');
            const status = document.getElementById('status-txt');
            
            btn.innerHTML = "SEVERING...";
            btn.classList.add('panic-pulse');
            btn.style.backgroundColor = '#ef4444';
            btn.style.color = '#fff';
            
            led.style.backgroundColor = '#ef4444';
            status.innerHTML = "Status: SEVERED";
            status.style.color = '#ef4444';

            setTimeout(() => {
                btn.innerHTML = "SEVERED";
                setTimeout(() => { location.reload(); }, 2000);
            }, 2500);
        }
    </script>
</body>
</html>
